<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoctorWebMD - Premium Dental Care for a Brighter Smile</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome CDN for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom styling for details/summary arrow rotation and marker removal */
        details > summary::-webkit-details-marker {
            display: none;
        }
        details > summary {
            list-style: none;
        }
        details[open] summary .arrow-icon {
            transform: rotate(180deg);
        }
        /* Custom focus styling for input fields (Tailwind's focus:ring is good, but this adds a subtle floating label effect) */
        .group input:focus + label,
        .group input:not(:placeholder-shown) + label {
            @apply -translate-y-6 scale-75 text-sky-600 dark:text-cyan-400;
        }
