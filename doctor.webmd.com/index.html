<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoctorWebMD - Premium Dental Care for a Brighter Smile</title>
    <meta name="description" content="Experience elite dental care with DoctorWebMD. Modern facilities, expert dentists, and a commitment to your radiant smile. Book your appointment today!">
    <meta name="keywords" content="dentist, dental care, DoctorWebMD, premium dentistry, smile, oral health, teeth whitening, dental implants, cosmetic dentistry, modern dental clinic">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* Custom HSL Color Palette */
        :root {
            --color-dark-slate: hsl(220, 20%, 12%);
            --color-dark-slate-light: hsl(220, 18%, 18%);
            --color-indigo: hsl(240, 70%, 60%);
            --color-teal: hsl(180, 70%, 50%);
            --color-text-light: hsl(0, 0%, 90%);
            --color-text-medium: hsl(0, 0%, 70%);
            --color-text-dark: hsl(0, 0%, 50%);
            --color-success: hsl(120, 60%, 40%);
            --color-error: hsl(0, 70%, 50%);
            --gradient-primary: linear-gradient(45deg, var(--color-indigo), var(--color-teal));
            --gradient-secondary: linear-gradient(45deg, hsl(240, 50%, 40%), hsl(180, 50%, 30%));
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow-premium: 0 12px 30px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 16px 40px rgba(0, 0, 0, 0.6);
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--color-text-light);
            background-color: var(--color-dark-slate);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.03em;
            color: var(--color-text-light);
        }

        h1 { font-size: 3.5rem; font-weight: 800; }
        h2 { font-size: 2.8rem; margin-bottom: 1.5rem; }
        h3 { font-size: 2rem; margin-bottom: 1rem; }
        h4 { font-size: 1.5rem; }

        p {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: var(--color-text-medium);
            letter-spacing: 0.01em;
        }

        a {
            color: var(--color-teal);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--color-indigo);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        section {
            padding: 8rem 0;
            position: relative;
            overflow: hidden;
        }

        /* Micro-animations & Transitions */
        .btn, .nav-link, .card, .testimonial-card, .faq-item summary, .form-group input, .form-group textarea {
            transition: all 0.3s ease-in-out;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .card:hover, .testimonial-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        /* Keyframe Entrance Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            box-shadow: var(--shadow-premium);
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--color-text-light);
            letter-spacing: -0.05em;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(var(--color-indigo), 0.5);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }

        .nav-link {
            color: var(--color-text-medium);
            font-weight: 500;
            position: relative;
            padding-bottom: 0.3rem;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-primary);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link.active {
            color: var(--color-text-light);
        }
        .nav-link.active::after {
            width: 100%;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-premium);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn.primary {
            background: var(--gradient-primary);
            color: var(--color-text-light);
        }

        .btn.secondary {
            background: var(--color-dark-slate-light);
            color: var(--color-text-light);
            border: 1px solid var(--glass-border);
        }

        .btn.secondary:hover {
            background: var(--gradient-secondary);
            border-color: transparent;
        }

        /* Hero Section */
        .hero {
            padding-top: 12rem; /* Account for fixed header */
            padding-bottom: 8rem;
            background: var(--color-dark-slate);
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            display: flex;
            align-items: center;
            gap: 4rem;
            flex-wrap: wrap;
        }

        .hero-left {
            flex: 1;
            min-width: 400px;
            animation-delay: 0.2s;
        }

        .hero-left h1 {
            margin-bottom: 1.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(var(--color-indigo), 0.7);
        }

        .hero-left p {
            max-width: 550px;
            margin-bottom: 2rem;
        }

        .trust-badges {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .trust-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-text-light);
            font-weight: 500;
            font-size: 1rem;
        }

        .trust-badge i {
            color: var(--color-success);
            font-size: 1.2rem;
        }

        .hero-actions {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .hero-right {
            flex: 1;
            min-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation-delay: 0.4s;
        }

        .hero-image-wrapper {
            width: 100%;
            max-width: 600px;
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-premium);
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-image {
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            object-fit: cover;
            border-radius: 15px;
        }

        /* Social Proof */
        .social-proof {
            background-color: var(--color-dark-slate-light);
            text-align: center;
        }

        .social-proof h2 {
            margin-bottom: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 3rem;
            margin-bottom: 5rem;
        }

        .logo-grid img {
            height: 40px;
            filter: grayscale(100%) brightness(150%);
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .logo-grid img:hover {
            filter: grayscale(0%) brightness(100%);
            opacity: 1;
            transform: scale(1.05);
        }

        .testimonials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .testimonial-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow-premium);
            text-align: left;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .testimonial-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 3px solid var(--color-teal);
            box-shadow: 0 0 0 5px rgba(var(--color-teal), 0.2);
        }

        .testimonial-card p {
            font-style: italic;
            margin-bottom: 1.5rem;
            color: var(--color-text-light);
            font-size: 1.05rem;
        }

        .testimonial-card .author {
            font-weight: 600;
            color: var(--color-indigo);
            font-size: 1.1rem;
        }

        .testimonial-card .rating {
            color: var(--color-success);
            margin-top: 0.5rem;
        }

        /* Services Grid */
        .services {
            text-align: center;
            background: var(--color-dark-slate);
        }

        .services h2 {
            margin-bottom: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .service-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: var(--shadow-premium);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .service-card i {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(var(--color-indigo), 0.5);
        }

        .service-card h3 {
            margin-bottom: 1rem;
            color: var(--color-text-light);
        }

        .service-card p {
            color: var(--color-text-medium);
            font-size: 1rem;
        }

        /* Interactive FAQ */
        .faq {
            background-color: var(--color-dark-slate-light);
            text-align: center;
        }

        .faq h2 {
            margin-bottom: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .faq-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }

        .faq-item {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-premium);
            overflow: hidden;
        }

        .faq-item summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--color-text-light);
            cursor: pointer;
            outline: none;
            position: relative;
            list-style: none; /* Hide default marker */
        }

        .faq-item summary::-webkit-details-marker {
            display: none; /* Hide default marker for Webkit browsers */
        }

        .faq-item summary::after {
            content: '\2b'; /* Plus icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--color-teal);
            transition: transform 0.3s ease;
        }

        .faq-item[open] summary::after {
            content: '\2212'; /* Minus icon */
            transform: rotate(180deg);
            color: var(--color-indigo);
        }

        .faq-item-content {
            padding: 0 2rem 1.5rem 2rem;
            color: var(--color-text-medium);
            font-size: 1rem;
            line-height: 1.7;
            border-top: 1px solid var(--glass-border);
            margin-top: -1px; /* Overlap border */
        }

        /* Premium Contact Form */
        .contact {
            background: var(--color-dark-slate);
            text-align: center;
        }

        .contact h2 {
            margin-bottom: 3rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-form-wrapper {
            max-width: 700px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3.5rem;
            box-shadow: var(--shadow-premium);
            text-align: left;
        }

        .form-group {
            position: relative;
            margin-bottom: 2.5rem;
        }

        .form-group label {
            position: absolute;
            top: 1rem;
            left: 1.2rem;
            color: var(--color-text-medium);
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.3s ease;
            background-color: var(--glass-bg); /* To hide input text underneath */
            padding: 0 0.5rem;
            border-radius: 4px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--color-text-light);
            font-size: 1rem;
            outline: none;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--color-teal);
            box-shadow: 0 0 0 3px rgba(var(--color-teal), 0.3), inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label,
        .form-group textarea:focus + label,
        .form-group textarea:not(:placeholder-shown) + label {
            top: -0.8rem;
            left: 1rem;
            font-size: 0.85rem;
            color: var(--color-indigo);
            transform: translateY(-50%);
            background-color: var(--glass-bg);
            padding: 0 0.5rem;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .form-group.error input,
        .form-group.error textarea {
            border-color: var(--color-error);
            box-shadow: 0 0 0 3px rgba(var(--color-error), 0.3);
        }

        .form-group.error label {
            color: var(--color-error);
        }

        .form-group .error-message {
            color: var(--color-error);
            font-size: 0.9rem;
            margin-top: 0.5rem;
